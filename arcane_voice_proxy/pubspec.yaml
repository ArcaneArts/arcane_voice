name: arcane_voice_proxy
description: Server-side realtime voice proxy for OpenAI, Gemini, Grok, ElevenLabs, and Twilio voice calls.
version: 1.3.1
repository: https://github.com/ArcaneArts/arcane_voice
environment:
  sdk: ^3.11.0
dependencies:
  arcane_voice_models: ^1.3.0
  fast_log: ^1.0.7
  web_socket_channel: ^3.0.3
dependency_overrides:
  arcane_voice_models:
    path: ../arcane_voice_models
dev_dependencies:
  http: ^1.2.2
  lints: ^6.0.0
  test: ^1.25.6
