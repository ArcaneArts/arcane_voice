name: arcane_voice
description: Flutter client runtime for provider-agnostic realtime voice calls through an Arcane Voice proxy.
version: 1.3.0
repository: https://github.com/ArcaneArts/arcane_voice
environment:
  sdk: ^3.11.0
dependencies:
  flutter:
    sdk: flutter
  arcane_voice_models: ^1.3.0
  audio_session: ^0.2.2
  fast_log: ^1.0.7
  flutter_soloud: ^3.3.7
  record: ^6.1.2
  web_socket_channel: ^3.0.3
dependency_overrides:
  arcane_voice_models:
    path: arcane_voice_models
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
